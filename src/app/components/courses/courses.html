<h2>Courses List</h2>

<div class="courses">

    @for(course of filteredCourses; track course.id){

    <div class="card" [ngClass]="{'full-course': course.seats === 0}" [ngStyle]="{
              'background-color': course.seats <= 2 && course.seats > 0 ? '#fff3cd' : 'white'
            }">

        <img [src]="course.image" [alt]="course.title">

        <h3>{{course.title}}</h3>

        <p>
            <strong>Instructor:</strong>
            {{course.instructor}}
        </p>

        <p>
            <strong>Price:</strong>
            <span #priceSpan>{{course.price|discount:20}}</span> EGP
        </p>

        <p>
            <strong>Seats:</strong>
            {{course.seats}}
        </p>

        @if(course.seats <= 2 && course.seats> 0){
            <p class="almost-full">
                Almost Full
            </p>
            }

            @if(course.seats === 0){
            <p class="full">
                Course Full
            </p>
            }

            <button appAppDisableAfterClick (click)="register(course,priceSpan.textContent)"
                [disableCondition]="course.seats === 0"
                [disabled]="course.seats === 0">
                
                Register
            </button>

    </div>

    }

</div>
