<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-primary mb-4">Contact Us</h2>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="Enter your name">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="form-control"
                    placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Message
                </label>

                <textarea
                    rows="4"
                    class="form-control"
                    placeholder="Write your message">
                </textarea>
            </div>

            <button
                type="submit"
                class="btn btn-primary">
                Send Message
            </button>

        </form>

    </div>

</div>
